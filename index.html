<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dhikr" />
  <meta name="description" content="A beautiful dhikr counter app. Remember. Reflect. Be at peace." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Dhikr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montaga&family=Noto+Sans+Arabic:wght@400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── SPLASH SCREEN — Figma design ── */
    #splash-screen {
      background: none;
    }
    .splash-bg-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .splash-bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.22);
      z-index: 1;
    }
    .splash-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 24px;
      gap: 0;
    }
    /* glass card */
    .splash-card {
      background: rgba(255,255,255,0.04);
      border: 0.1px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      box-shadow: 0 0 70px 0 rgba(255,255,255,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 28px 20px;
      width: 100%;
      max-width: 360px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .splash-title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-align: center;
      color: white;
      width: 100%;
    }
    .logo-title {
      font-family: 'Montaga', serif !important;
      font-size: clamp(36px, 10vw, 60px);
      font-weight: 400;
      color: white !important;
      letter-spacing: 2px;
      line-height: 1;
      margin: 0;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.2s;
    }
    .logo-arabic {
      font-family: 'Montaga', 'Noto Sans Arabic', serif !important;
      font-size: clamp(30px, 9vw, 60px);
      color: white !important;
      line-height: 1.1;
      margin: 0;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.35s;
      opacity: 0;
    }
    .tagline {
      font-family: 'Montaga', serif;
      font-size: clamp(13px, 3vw, 18px);
      color: white;
      font-weight: 400;
      letter-spacing: 0.5px;
      line-height: 1.5;
      margin: 0;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.5s;
      opacity: 0;
    }
    .begin-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: black;
      color: white;
      border: none;
      border-radius: 28px;
      padding: 14px 20px 14px 18px;
      font-family: 'Montaga', serif;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      width: 140px;
      justify-content: center;
      letter-spacing: 0.3px;
      transition: transform 0.2s ease, opacity 0.2s ease;
      animation: fadeUp 0.8s ease both;
      animation-delay: 0.65s;
      opacity: 0;
    }
    .begin-btn:active { transform: scale(0.95); opacity: 0.85; }
    .begin-btn svg { width: 20px; height: 20px; stroke: white; flex-shrink: 0; }

    /* ── Dhikr card extras ── */
    .dhikr-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 4px;
      display: block;
    }
    .dhikr-urdu {
      font-size: 13px;
      color: var(--text-soft);
      margin-top: 5px;
      font-weight: 400;
      direction: rtl;
      font-family: 'Noto Sans Arabic', sans-serif;
      line-height: 1.6;
    }
    .dhikr-name-wrap {
      max-height: 140px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .dhikr-name-wrap::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <!-- SCREEN 1: SPLASH — matches Figma design -->
  <div id="splash-screen" class="screen active">

    <!-- Makkah background image -->
    <img
      class="splash-bg-img"
      src="https://www.figma.com/api/mcp/asset/7cfb4923-90dd-4cfa-a736-d3df21ea4864"
      alt=""
    />
    <div class="splash-bg-overlay"></div>

    <!-- Decorative top ornament from Figma -->
    </div>

    <div class="splash-content">
      <!-- Glass card -->
      <div class="splash-card">
        <div class="splash-title-block">
          <h1 class="logo-title">Dhikr</h1>
          <p class="logo-arabic">ذِكر</p>
          <p class="tagline">Remember. Reflect.<br>Be at peace.</p>
        </div>
        <button class="begin-btn" id="beginBtn">
          <span>Begin</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: COUNTER -->
  <div id="counter-screen" class="screen">
    <div class="counter-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="counter-layout">

      <!-- Header -->
      <div class="counter-header">
        <button class="back-btn" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="session-info">
          <span class="session-label">Session Total</span>
          <span class="session-count" id="sessionTotal">0</span>
        </div>
      </div>

      <!-- Dhikr Selector -->
      <div class="dhikr-selector">
        <button class="dhikr-nav" id="prevDhikr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="dhikr-name-wrap">
          <span class="dhikr-label" id="dhikrLabel"></span>
          <p class="dhikr-arabic" id="dhikrArabic"></p>
          <p class="dhikr-urdu"   id="dhikrUrdu"></p>
          <p class="dhikr-name"   id="dhikrName"></p>
        </div>
        <button class="dhikr-nav" id="nextDhikr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <!-- Main Counter Button -->
      <div class="counter-wrap">
        <div class="counter-rings">
          <div class="ring ring1"></div>
          <div class="ring ring2"></div>
          <div class="ring ring3"></div>
        </div>
        <button class="counter-btn" id="counterBtn">
          <span class="count-number" id="countDisplay">0</span>
        </button>
        <div class="ripple-container" id="rippleContainer"></div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText">0 / 33</p>
      </div>

      <!-- Bottom Controls -->
      <div class="bottom-controls">
        <button class="target-btn" id="targetBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          <span>Target: <span id="targetLabel">33</span></span>
        </button>
        <button class="reset-btn" id="resetBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          <span>Reset</span>
        </button>
      </div>
    </div>

    <!-- Target Modal -->
    <div class="modal-overlay" id="targetModal">
      <div class="modal">
        <h3>Set Target</h3>
        <div class="target-options">
          <button class="target-opt" data-val="33">33</button>
          <button class="target-opt" data-val="99">99</button>
          <button class="target-opt" data-val="100">100</button>
          <button class="target-opt" data-val="500">500</button>
        </div>
        <div class="custom-target">
          <input type="number" id="customTarget" placeholder="Custom..." min="1" max="9999" />
          <button id="setCustomTarget">Set</button>
        </div>
        <button class="modal-close" id="modalClose">Cancel</button>
      </div>
    </div>

    <!-- Celebration overlay -->
    <div class="celebration" id="celebration">
      <div class="celebration-text">
        <p class="cel-arabic">مَاشَاءَ اللَّه</p>
        <p class="cel-sub">MashaAllah! 🤍</p>
      </div>
      <canvas id="confettiCanvas"></canvas>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
