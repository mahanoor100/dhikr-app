<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3B0764" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dhikr" />
  <meta name="description" content="A beautiful dhikr counter app. Remember. Reflect. Be at peace." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Dhikr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Bismillah footer ── */
    .splash-footer {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      z-index: 2;
      display: flex;
      gap: 10px;
      align-items: center;
      direction: rtl;
    }
    .bism-word {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      letter-spacing: 2px;
      opacity: 0;
      position: relative;
      display: inline-block;
    }
    .bism-word.reveal {
      animation: bismReveal 0.7s cubic-bezier(0.34,1.4,0.64,1) forwards;
    }
    @keyframes bismReveal {
      from { opacity: 0; transform: translateY(10px) scale(0.85); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .bism-word .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      pointer-events: none;
      animation: sparklePop 0.7s ease forwards;
    }
    @keyframes sparklePop {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
    }
    .bism-word.shimmer {
      background: linear-gradient(90deg, #6B21A8 0%, #c084fc 40%, #f9a8d4 60%, #6B21A8 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerFlow 2.5s linear infinite;
    }
    @keyframes shimmerFlow {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ── Dhikr card extras ── */
    .dhikr-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 4px;
      display: block;
    }
    .dhikr-urdu {
      font-size: 13px;
      color: var(--text-soft);
      margin-top: 5px;
      font-weight: 400;
      direction: rtl;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      line-height: 1.5;
    }
    .dhikr-name-wrap {
      max-height: 130px;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .dhikr-name-wrap::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <!-- SCREEN 1: SPLASH -->
  <div id="splash-screen" class="screen active">
    <div class="splash-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>
    <div class="splash-content">
      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <div class="logo-beads">
          <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="bead-svg">
            <circle cx="10" cy="20" r="5" fill="#C084FC" opacity="0.6"/>
            <circle cx="30" cy="20" r="5" fill="#C084FC" opacity="0.7"/>
            <circle cx="50" cy="20" r="5" fill="#C084FC" opacity="0.8"/>
            <circle cx="70" cy="20" r="5" fill="#C084FC" opacity="0.9"/>
            <circle cx="90" cy="20" r="5" fill="#C084FC"/>
            <circle cx="110" cy="20" r="5" fill="#C084FC"/>
            <line x1="5" y1="20" x2="115" y2="20" stroke="#C084FC" stroke-width="1.5" opacity="0.4"/>
          </svg>
        </div>
        <h1 class="logo-title">Dhikr</h1>
        <p class="logo-arabic">ذِكر</p>
      </div>
      <p class="tagline">Remember. Reflect. Be at peace.</p>
      <button class="begin-btn" id="beginBtn">
        <span>Begin</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Bismillah — words revealed one by one right-to-left -->
    <p class="splash-footer" id="bismillahFooter">
      <span class="bism-word" data-delay="1500">الرَّحِيْمِ</span>
      <span class="bism-word" data-delay="1100">الرَّحْمٰنِ</span>
      <span class="bism-word" data-delay="700">اللهِ</span>
      <span class="bism-word" data-delay="300">بِسْمِ</span>
    </p>
  </div>

  <!-- SCREEN 2: COUNTER -->
  <div id="counter-screen" class="screen">
    <div class="counter-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>

    <div class="counter-layout">

      <!-- Header -->
      <div class="counter-header">
        <button class="back-btn" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="session-info">
          <span class="session-label">Session Total</span>
          <span class="session-count" id="sessionTotal">0</span>
        </div>
      </div>

      <!-- Dhikr Selector -->
      <div class="dhikr-selector">
        <button class="dhikr-nav" id="prevDhikr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="dhikr-name-wrap">
          <span class="dhikr-label" id="dhikrLabel"></span>
          <p class="dhikr-arabic" id="dhikrArabic"></p>
          <p class="dhikr-urdu"   id="dhikrUrdu"></p>
          <p class="dhikr-name"   id="dhikrName"></p>
        </div>
        <button class="dhikr-nav" id="nextDhikr">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>

      <!-- Main Counter Button -->
      <div class="counter-wrap">
        <div class="counter-rings">
          <div class="ring ring1"></div>
          <div class="ring ring2"></div>
          <div class="ring ring3"></div>
        </div>
        <button class="counter-btn" id="counterBtn">
          <span class="count-number" id="countDisplay">0</span>
        </button>
        <div class="ripple-container" id="rippleContainer"></div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText">0 / 33</p>
      </div>

      <!-- Bottom Controls -->
      <div class="bottom-controls">
        <button class="target-btn" id="targetBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          <span>Target: <span id="targetLabel">33</span></span>
        </button>
        <button class="reset-btn" id="resetBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          <span>Reset</span>
        </button>
      </div>
    </div>

    <!-- Target Modal -->
    <div class="modal-overlay" id="targetModal">
      <div class="modal">
        <h3>Set Target</h3>
        <div class="target-options">
          <button class="target-opt" data-val="33">33</button>
          <button class="target-opt" data-val="99">99</button>
          <button class="target-opt" data-val="100">100</button>
          <button class="target-opt" data-val="500">500</button>
        </div>
        <div class="custom-target">
          <input type="number" id="customTarget" placeholder="Custom..." min="1" max="9999" />
          <button id="setCustomTarget">Set</button>
        </div>
        <button class="modal-close" id="modalClose">Cancel</button>
      </div>
    </div>

    <!-- Celebration overlay -->
    <div class="celebration" id="celebration">
      <div class="celebration-text">
        <p class="cel-arabic">مَاشَاءَ اللَّه</p>
        <p class="cel-sub">MashaAllah! 🤍</p>
      </div>
      <canvas id="confettiCanvas"></canvas>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    /* ── Bismillah word-by-word sparkle animation ── */
    const bismWords = document.querySelectorAll('.bism-word');
    const sparkleColors = ['#c084fc','#f9a8d4','#fde68a','#ffffff','#a78bfa'];

    function burstSparkles(el) {
      for (let i = 0; i < 8; i++) {
        const s = document.createElement('span');
        s.className = 'sparkle';
        const angle = (i / 8) * 2 * Math.PI;
        const dist  = 18 + Math.random() * 14;
        s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
        s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
        s.style.background = sparkleColors[Math.floor(Math.random() * sparkleColors.length)];
        s.style.left = '50%';
        s.style.top  = '50%';
        s.style.marginLeft = '-3px';
        s.style.marginTop  = '-3px';
        el.appendChild(s);
        setTimeout(() => s.remove(), 700);
      }
    }

    bismWords.forEach(word => {
      const delay = parseInt(word.dataset.delay);
      setTimeout(() => {
        word.classList.add('reveal');
        burstSparkles(word);
        setTimeout(() => word.classList.add('shimmer'), 500);
      }, delay);
    });
  </script>
</body>
</html>
